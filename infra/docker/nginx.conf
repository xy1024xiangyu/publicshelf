# ──────────────────────────────────────────────────────────────────────────────
# OpenShelf — Nginx production configuration
# ──────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;  # Hide Nginx version

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=general:10m rate=60r/s;
    limit_conn_zone $binary_remote_addr  zone=addr:10m;

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # Redirect all HTTP to HTTPS in production
        # (Remove / comment out if SSL is terminated upstream by a load balancer)
        # return 301 https://$host$request_uri;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"          always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header X-XSS-Protection          "1; mode=block"       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;"
            always;

        root /usr/share/nginx/html;
        index index.html;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     60s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 16k;
        }

        # ── Next.js static assets (_next/static) ─────────────────────────────
        location /_next/static/ {
            alias /usr/share/nginx/html/_next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Static file assets ────────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 6M;
            add_header Cache-Control "public, must-revalidate";
            access_log off;
        }

        # ── Favicon ───────────────────────────────────────────────────────────
        location = /favicon.ico {
            log_not_found off;
            access_log    off;
        }

        # ── Robots.txt ────────────────────────────────────────────────────────
        location = /robots.txt {
            log_not_found off;
            access_log    off;
        }

        # ── Health endpoint (for load balancer probes) ─────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── SPA fallback (Next.js client-side routing) ────────────────────────
        location / {
            limit_req zone=general burst=40 nodelay;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 404              /404.html;
        error_page 500 502 503 504  /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── HTTPS server (uncomment when SSL certs are available) ─────────────────
    # server {
    #     listen      443 ssl http2;
    #     listen      [::]:443 ssl http2;
    #     server_name openshelf.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... same location blocks as above ...
    # }
}
