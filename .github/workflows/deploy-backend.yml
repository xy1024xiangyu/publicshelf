name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'importers/**'
      - 'db/**'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image-tag.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          echo "image=${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build ./backend \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:latest

      - name: Push Docker image (SHA tag)
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:${{ github.sha }}

      - name: Push Docker image (latest tag)
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name openshelf-backend \
            --resource-group openshelf-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/openshelf-backend:${{ github.sha }}

      - name: Run database migrations
        run: |
          az containerapp exec \
            --name openshelf-backend \
            --resource-group openshelf-rg \
            --command "alembic upgrade head"

      - name: Notify Slack on success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *OpenShelf Backend deployed successfully*\nCommit: `${{ github.sha }}`\nTriggered by: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *OpenShelf Backend deployment FAILED*\nCommit: `${{ github.sha }}`\nTriggered by: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
